<svg width="760" height="560" viewBox="0 0 760 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="langs-title langs-desc">
<title id="langs-title">Top languages for utshomh</title>
<desc id="langs-desc">Animated top-language card generated from public repository language bytes with mobile-safe row spacing.</desc>
<defs>
  <clipPath id="langs-outerClip"><rect width="760" height="560" rx="34"/></clipPath>
  <clipPath id="langs-panelClip"><rect x="24" y="24" width="712" height="512" rx="30"/></clipPath>
  <linearGradient id="langs-bg" x1="0" y1="0" x2="760" y2="560" gradientUnits="userSpaceOnUse"><stop stop-color="#07101F"/><stop offset="0.48" stop-color="#101B36"/><stop offset="1" stop-color="#27113F"/></linearGradient>
  <linearGradient id="langs-neon" x1="42" y1="20" x2="718" y2="540" gradientUnits="userSpaceOnUse"><stop stop-color="#22D3EE"/><stop offset="0.45" stop-color="#7C3AED"/><stop offset="1" stop-color="#00FF88"/></linearGradient>
  <linearGradient id="langs-fire" x1="90" y1="40" x2="670" y2="520" gradientUnits="userSpaceOnUse"><stop stop-color="#FBBF24"/><stop offset="0.48" stop-color="#FF6B6B"/><stop offset="1" stop-color="#A855F7"/></linearGradient>
  <linearGradient id="langs-glass" x1="24" y1="24" x2="736" y2="536" gradientUnits="userSpaceOnUse"><stop stop-color="#111827" stop-opacity="0.96"/><stop offset="1" stop-color="#0B1020" stop-opacity="0.92"/></linearGradient>
  <linearGradient id="langs-shine" x1="0" y1="0" x2="180" y2="0" gradientUnits="userSpaceOnUse"><stop stop-color="#FFFFFF" stop-opacity="0"/><stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.45"/><stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/></linearGradient>
  <filter id="langs-shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.48"/></filter>
  <filter id="langs-glow"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  
</defs>

<style>
  * { box-sizing: border-box; }
  .font { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
  .mono { font-family: "Fira Code", "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
  .float { animation: float 7s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
  .float2 { animation: float 9s ease-in-out infinite reverse; transform-origin: center; transform-box: fill-box; }
  .pulse { animation: pulse 2.4s ease-in-out infinite; }
  .twinkle { animation: twinkle 2.8s ease-in-out infinite; }
  .dash { stroke-dasharray: 14 18; animation: dash 18s linear infinite; }
  .draw { stroke-dasharray: 780; stroke-dashoffset: 780; animation: draw 2.4s ease-out forwards, dash 16s linear infinite 2.4s; }
  .fadeUp { animation: fadeUp .82s cubic-bezier(.2,.8,.2,1) both; }
  .delay1 { animation-delay: .08s; }
  .delay2 { animation-delay: .16s; }
  .delay3 { animation-delay: .24s; }
  .delay4 { animation-delay: .32s; }
  .delay5 { animation-delay: .40s; }
  .delay6 { animation-delay: .48s; }
  .delay7 { animation-delay: .56s; }
  .scan { animation: scan 4.8s ease-in-out infinite; }
  .barGlow { animation: glowPulse 3.4s ease-in-out infinite; }
  .tilt { animation: tilt 10s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
  @keyframes pulse { 0%,100% { opacity: .32; transform: scale(.94); } 50% { opacity: 1; transform: scale(1.08); } }
  @keyframes twinkle { 0%,100% { opacity: .25; } 45% { opacity: .95; } }
  @keyframes dash { to { stroke-dashoffset: -280; } }
  @keyframes draw { to { stroke-dashoffset: 0; } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px) scale(.985); } to { opacity: 1; transform: translateY(0) scale(1); } }
  @keyframes scan { 0% { transform: translateX(-240px); opacity: 0; } 14% { opacity: .28; } 54% { opacity: .12; } 100% { transform: translateX(980px); opacity: 0; } }
  @keyframes glowPulse { 0%,100% { opacity: .66; } 50% { opacity: 1; } }
  @keyframes tilt { 0%,100% { transform: rotate(-1deg); } 50% { transform: rotate(1.2deg); } }
  @media (prefers-reduced-motion: reduce) {
    .float, .float2, .pulse, .twinkle, .dash, .draw, .fadeUp, .scan, .barGlow, .tilt { animation: none !important; }
  }
</style>
<g clip-path="url(#langs-outerClip)">
  <rect width="760" height="560" rx="34" fill="url(#langs-bg)"/>
<g clip-path="url(#langs-panelClip)">
  <rect x="24" y="24" width="712" height="512" rx="30" fill="url(#langs-glass)" filter="url(#langs-shadow)"/>
  <path class="tilt" d="M0 148C112 46 192 178 295 104C404 26 488 34 582 122C656 191 708 104 760 72V560H0V148Z" fill="url(#langs-neon)" opacity="0.22"/>
  <circle class="float" cx="650" cy="88" r="96" fill="#22D3EE" opacity="0.11"/>
  <circle class="float2" cx="116" cy="488" r="122" fill="#A855F7" opacity="0.12"/>
  <rect class="scan" x="-260" y="24" width="180" height="512" fill="url(#langs-shine)" opacity="0.24" transform="skewX(-18)"/>
  <g opacity="0.5">
    <circle class="twinkle" style="animation-delay:0.00s" cx="78" cy="132" r="2" fill="#22D3EE"/>
<circle class="twinkle" style="animation-delay:0.37s" cx="678" cy="150" r="1.8" fill="#00FF88"/>
<circle class="twinkle" style="animation-delay:0.74s" cx="592" cy="466" r="2.4" fill="#22D3EE"/>
<circle class="twinkle" style="animation-delay:1.11s" cx="158" cy="422" r="1.7" fill="#00FF88"/>
<circle class="twinkle" style="animation-delay:1.48s" cx="365" cy="78" r="1.6" fill="#22D3EE"/>
<circle class="twinkle" style="animation-delay:1.85s" cx="426" cy="496" r="2" fill="#00FF88"/>
  </g>
</g>
<rect x="24" y="24" width="712" height="512" rx="30" stroke="#2B3856" stroke-opacity="0.95"/>
<g class="font">
  <text x="56" y="80" fill="#E6EDF3" font-size="32" font-weight="950">Top language mix</text>
  <text class="mono" x="58" y="110" fill="#9CA3AF" font-size="13">@utshomh + @utshowmh + @mahadyhassanutsho + @utsho-fleekbd · fallback language by…</text>
  <g class="fadeUp delay1 font">
  <text x="62" y="138" fill="#D1D5DB" font-size="14" font-weight="850">TypeScript</text>
  <text x="698" y="138" fill="#9CA3AF" font-size="12" font-weight="800" text-anchor="end">36%</text>
  <rect x="62" y="150" width="636" height="16" rx="9" fill="#202A3F"/>
  <rect class="barGlow" x="62" y="150" width="229" height="16" rx="9" fill="#3178C6">
    <animate attributeName="width" from="8" to="229" dur="0.72s" fill="freeze" calcMode="spline" keySplines=".2 .8 .2 1"/>
  </rect>
  <rect x="66" y="154" width="221" height="3" rx="2" fill="#FFFFFF" opacity="0.25"/>
</g>
<g class="fadeUp delay2 font">
  <text x="62" y="182" fill="#D1D5DB" font-size="14" font-weight="850">JavaScript</text>
  <text x="698" y="182" fill="#9CA3AF" font-size="12" font-weight="800" text-anchor="end">25%</text>
  <rect x="62" y="194" width="636" height="16" rx="9" fill="#202A3F"/>
  <rect class="barGlow" x="62" y="194" width="159" height="16" rx="9" fill="#F7DF1E">
    <animate attributeName="width" from="8" to="159" dur="0.80s" fill="freeze" calcMode="spline" keySplines=".2 .8 .2 1"/>
  </rect>
  <rect x="66" y="198" width="151" height="3" rx="2" fill="#FFFFFF" opacity="0.25"/>
</g>
<g class="fadeUp delay3 font">
  <text x="62" y="226" fill="#D1D5DB" font-size="14" font-weight="850">Rust</text>
  <text x="698" y="226" fill="#9CA3AF" font-size="12" font-weight="800" text-anchor="end">21%</text>
  <rect x="62" y="238" width="636" height="16" rx="9" fill="#202A3F"/>
  <rect class="barGlow" x="62" y="238" width="134" height="16" rx="9" fill="#DEA584">
    <animate attributeName="width" from="8" to="134" dur="0.88s" fill="freeze" calcMode="spline" keySplines=".2 .8 .2 1"/>
  </rect>
  <rect x="66" y="242" width="126" height="3" rx="2" fill="#FFFFFF" opacity="0.25"/>
</g>
<g class="fadeUp delay4 font">
  <text x="62" y="270" fill="#D1D5DB" font-size="14" font-weight="850">Shell</text>
  <text x="698" y="270" fill="#9CA3AF" font-size="12" font-weight="800" text-anchor="end">5%</text>
  <rect x="62" y="282" width="636" height="16" rx="9" fill="#202A3F"/>
  <rect class="barGlow" x="62" y="282" width="32" height="16" rx="9" fill="#89E051">
    <animate attributeName="width" from="8" to="32" dur="0.96s" fill="freeze" calcMode="spline" keySplines=".2 .8 .2 1"/>
  </rect>
  <rect x="66" y="286" width="24" height="3" rx="2" fill="#FFFFFF" opacity="0.25"/>
</g>
<g class="fadeUp delay5 font">
  <text x="62" y="314" fill="#D1D5DB" font-size="14" font-weight="850">Go</text>
  <text x="698" y="314" fill="#9CA3AF" font-size="12" font-weight="800" text-anchor="end">4%</text>
  <rect x="62" y="326" width="636" height="16" rx="9" fill="#202A3F"/>
  <rect class="barGlow" x="62" y="326" width="25" height="16" rx="9" fill="#00ADD8">
    <animate attributeName="width" from="8" to="25" dur="1.04s" fill="freeze" calcMode="spline" keySplines=".2 .8 .2 1"/>
  </rect>
  <rect x="66" y="330" width="17" height="3" rx="2" fill="#FFFFFF" opacity="0.25"/>
</g>
<g class="fadeUp delay6 font">
  <text x="62" y="358" fill="#D1D5DB" font-size="14" font-weight="850">HTML</text>
  <text x="698" y="358" fill="#9CA3AF" font-size="12" font-weight="800" text-anchor="end">4%</text>
  <rect x="62" y="370" width="636" height="16" rx="9" fill="#202A3F"/>
  <rect class="barGlow" x="62" y="370" width="25" height="16" rx="9" fill="#E34C26">
    <animate attributeName="width" from="8" to="25" dur="1.12s" fill="freeze" calcMode="spline" keySplines=".2 .8 .2 1"/>
  </rect>
  <rect x="66" y="374" width="17" height="3" rx="2" fill="#FFFFFF" opacity="0.25"/>
</g>
<g class="fadeUp delay7 font">
  <text x="62" y="402" fill="#D1D5DB" font-size="14" font-weight="850">CSS</text>
  <text x="698" y="402" fill="#9CA3AF" font-size="12" font-weight="800" text-anchor="end">3%</text>
  <rect x="62" y="414" width="636" height="16" rx="9" fill="#202A3F"/>
  <rect class="barGlow" x="62" y="414" width="19" height="16" rx="9" fill="#663399">
    <animate attributeName="width" from="8" to="19" dur="1.20s" fill="freeze" calcMode="spline" keySplines=".2 .8 .2 1"/>
  </rect>
  <rect x="66" y="418" width="11" height="3" rx="2" fill="#FFFFFF" opacity="0.25"/>
</g>
<g class="fadeUp delay7 font">
  <text x="62" y="446" fill="#D1D5DB" font-size="14" font-weight="850">Lua</text>
  <text x="698" y="446" fill="#9CA3AF" font-size="12" font-weight="800" text-anchor="end">2%</text>
  <rect x="62" y="458" width="636" height="16" rx="9" fill="#202A3F"/>
  <rect class="barGlow" x="62" y="458" width="13" height="16" rx="9" fill="#000080">
    <animate attributeName="width" from="8" to="13" dur="1.28s" fill="freeze" calcMode="spline" keySplines=".2 .8 .2 1"/>
  </rect>
  <rect x="66" y="462" width="5" height="3" rx="2" fill="#FFFFFF" opacity="0.25"/>
</g>
  <g class="fadeUp delay7">
    <rect x="56" y="500" width="648" height="28" rx="14" fill="#0F172A" stroke="#26324A"/>
    <text class="mono" x="72" y="519" fill="#8B949E" font-size="11">Mobile fix: rows are stacked with full-width progress bars, not squeezed table columns.</text>
  </g>
</g>
</g>
<rect x="1" y="1" width="758" height="558" rx="33" stroke="#2D3A58" stroke-opacity="0.84"/>
</svg>